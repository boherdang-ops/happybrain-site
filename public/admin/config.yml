# ============================================================
#  Sveltia CMS 설정
#  아래 3곳(REPO, base_url)을 본인 값으로 바꾼 뒤 배포하세요.
#  자세한 순서는 저장소 루트의 SETUP.md 참고.
# ============================================================

backend:
  name: github
  repo: boherdang-ops/happybrain-site
  branch: main
  # 로그인: 개인 액세스 토큰(PAT) 방식 — 별도 Worker 불필요

# 이미지 업로드 위치
media_folder: "public/uploads"
public_folder: "/uploads"

# 관리자 UI 언어
locale: ko

collections:
  # ── 글 ──────────────────────────────────────────────
  - name: writing
    label: "글"
    label_singular: "글"
    description: "공부·연구 아카이브. 본진 콘텐츠입니다."
    folder: "src/content/writing"
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    sortable_fields: [date, title]
    fields:
      - { name: title, label: "제목", widget: string }
      - { name: date, label: "날짜", widget: datetime, date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD" }
      - name: category
        label: "분류"
        widget: select
        options: ["AI 활용법", "AI 행정혁신", "Human Premium", "교육 노트"]
      - { name: summary, label: "요약 (목록에 보임)", widget: text, required: false }
      - { name: draft, label: "임시저장(공개 안 함)", widget: boolean, default: false }
      - { name: body, label: "본문", widget: markdown }

  # ── 책 ──────────────────────────────────────────────
  - name: books
    label: "책"
    label_singular: "책"
    folder: "src/content/books"
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { name: title, label: "제목", widget: string }
      - { name: status, label: "상태", widget: select, options: ["출간", "집필 중", "기획 중"], default: "출간" }
      - { name: year, label: "연도", widget: string, required: false }
      - { name: cover, label: "표지 이미지", widget: image, required: false }
      - { name: link, label: "구매/소개 링크", widget: string, required: false }
      - { name: order, label: "정렬 순서 (작을수록 먼저)", widget: number, default: 0, value_type: int }
      - { name: body, label: "소개글", widget: markdown }

  # ── 영상 ────────────────────────────────────────────
  - name: videos
    label: "영상"
    label_singular: "영상"
    folder: "src/content/videos"
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { name: title, label: "제목", widget: string }
      - { name: url, label: "유튜브 링크", widget: string }
      - { name: thumbnail, label: "썸네일 이미지", widget: image, required: false }
      - { name: date, label: "날짜", widget: datetime, date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD", required: false }
      - { name: order, label: "정렬 순서 (작을수록 먼저)", widget: number, default: 0, value_type: int }

  # ── 행정지원앱 ──────────────────────────────────────
  - name: apps
    label: "행정지원앱"
    label_singular: "앱"
    folder: "src/content/apps"
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { name: title, label: "앱 이름", widget: string }
      - { name: summary, label: "설명", widget: text }
      - { name: url, label: "링크 (예: /apps/press-release/ )", widget: string }
      - { name: tag, label: "분류 태그 (예: 보도자료)", widget: string, required: false }
      - { name: badge, label: "뱃지 (예: 무료)", widget: string, required: false }
      - { name: order, label: "정렬 순서 (작을수록 먼저)", widget: number, default: 0, value_type: int }

  # ── 페이지 (소개·강의문의) ─────────────────────────
  - name: pages
    label: "페이지 내용"
    editor:
      preview: false
    files:
      - name: about
        label: "소개 페이지"
        file: "src/data/about.json"
        fields:
          - { name: name, label: "이름", widget: string }
          - { name: penName, label: "필명", widget: string }
          - { name: intro, label: "소개 문단", widget: text }
          - { name: homeHeading, label: "홈 화면 소개 제목 (비우면 '이 기록을 남기는 사람')", widget: string, required: false }
          - { name: homeSummary, label: "홈 화면 소개 문단 (비우면 위 소개 문단 사용)", widget: text, required: false }
          - name: focus
            label: "하는 일 (카드 3개)"
            widget: list
            fields:
              - { name: title, label: "제목", widget: string }
              - { name: body, label: "설명", widget: text }
          - name: career
            label: "지나온 자리"
            widget: list
            fields:
              - { name: period, label: "시기 (예: 현재 / 이전)", widget: string }
              - { name: role, label: "내용", widget: string }
          - { name: ctaHeading, label: "하단 문구 - 제목", widget: string }
          - { name: ctaBody, label: "하단 문구 - 설명", widget: string }
      - name: contact
        label: "강의·문의 페이지"
        file: "src/data/contact.json"
        fields:
          - { name: email, label: "이메일", widget: string }
          - { name: note, label: "안내 문구", widget: text }
      - name: site
        label: "사이트 설정 (채널 링크)"
        file: "src/data/site.json"
        fields:
          - { name: footerName, label: "맨 아래 이름 (예: 해피브레인)", widget: string }
          - { name: footerTagline, label: "맨 아래 소개 문구 (줄바꿈은 Enter로)", widget: text }
          - name: channels
            label: "채널 링크 (맨 아래 푸터·연락처에 함께 반영)"
            widget: list
            fields:
              - { name: label, label: "이름 (예: 유튜브)", widget: string }
              - { name: href, label: "링크 주소 (내 채널 주소)", widget: string }
      - name: home
        label: "홈 화면 (첫 화면 문구)"
        file: "src/data/home.json"
        fields:
          - { name: heroEyebrow, label: "작은 윗줄 (예: 해피브레인 · 박상득)", widget: string }
          - { name: heroTitle, label: "큰 제목 (줄바꿈은 Enter로)", widget: text }
          - { name: heroLead, label: "제목 아래 설명 문구", widget: text }
